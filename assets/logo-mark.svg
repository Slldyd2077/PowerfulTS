<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="PowerfulTS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#gloss)"/>

  <g fill="#ffffff">
    <rect x="27.5" y="76" width="9" height="28" rx="4.5" opacity="0.72"/>
    <rect x="43.5" y="58" width="9" height="46" rx="4.5" opacity="0.90"/>
    <rect x="59.5" y="40" width="9" height="64" rx="4.5"/>
    <rect x="75.5" y="58" width="9" height="46" rx="4.5" opacity="0.90"/>
    <rect x="91.5" y="76" width="9" height="28" rx="4.5" opacity="0.72"/>
  </g>

  <g fill="none" stroke="#ffffff" stroke-width="1.6">
    <circle cx="64" cy="26" r="12" opacity="0.30"/>
    <circle cx="64" cy="26" r="18" opacity="0.14"/>
  </g>
  <circle cx="64" cy="26" r="5.6" fill="#cffafe" filter="url(#glow)"/>
</svg>
